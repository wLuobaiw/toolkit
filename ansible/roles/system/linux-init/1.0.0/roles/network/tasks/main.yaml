---
- name: Set hostname
  hostname:
    name: "{{ hostname }}"

- name: Detect default network interface
  shell: ip route | grep default | awk '{print $5}'
  register: default_iface
  changed_when: false
  when: network_interface | length == 0

- name: Set network_interface fact
  set_fact:
    network_interface: "{{ default_iface.stdout }}"
  when: network_interface | length == 0

- name: Check resolv.conf state
  stat:
    path: /etc/resolv.conf
  register: resolv_conf

- name: Remove resolv.conf symlink
  file:
    path: /etc/resolv.conf
    state: absent
  when: resolv_conf.stat.islnk is defined and resolv_conf.stat.islnk

- name: Configure DNS
  template:
    src: resolv.conf.j2
    dest: /etc/resolv.conf
    mode: '0644'

- name: Include OS-specific network tasks
  include_tasks: "{{ ansible_os_family | lower }}.yml"
