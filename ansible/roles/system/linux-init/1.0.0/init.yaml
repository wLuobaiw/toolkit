---
- name: Initialize Linux server configuration
  hosts: all
  become: yes
  vars_files:
    - conf.yaml
  roles:
    - role: network
      when: linux_init_network | default(true)
    - role: ssh-hardening
      when: linux_init_ssh | default(true)
    - role: base-packages
      when: linux_init_packages | default(true)
    - role: oh-my-zsh
      when: linux_init_zsh | default(true)
    - role: firewall
      when: linux_init_firewall | default(true)
